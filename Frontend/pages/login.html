<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - BookTalk</title>
    <link rel="stylesheet" href="../styles/main.css">
    <link rel="stylesheet" href="../styles/auth.css">
</head>
<body class="auth-body">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-logo">
                    <div class="logo-icon">📚</div>
                    <h1 class="logo-text">BookTalk</h1>
                </div>
                <h2 class="auth-title">Welcome Back</h2>
                <p class="auth-subtitle">Sign in to continue your reading journey</p>
            </div>
            
            <form id="loginForm" class="auth-form" onsubmit="login(event)">
                <div class="form-group">
                    <label for="username">Username</label>
                    <div class="input-wrapper">
                        <span class="input-icon">👤</span>
                        <input type="text" id="username" name="username" required placeholder="Enter your username">
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <span class="input-icon">🔒</span>
                        <input type="password" id="password" name="password" required placeholder="Enter your password">
                    </div>
                </div>
                
                <div class="form-options">
                    <label class="checkbox-label">
                        <input type="checkbox" id="rememberMe">
                        <span class="checkmark"></span>
                        Remember me
                    </label>
                    <a href="#" class="forgot-link">Forgot password?</a>
                </div>
                
                <button type="submit" class="btn btn-primary btn-full">
                    <span>Sign In</span>
                </button>
                
                <div id="errorMessage" class="error-message" style="display: none;"></div>
            </form>
            
            <div class="auth-footer">
                <p>Don't have an account? <a href="signup.html" class="signup-link">Sign up here</a></p>
            </div>
            
            <div class="auth-divider">
                <span>or</span>
            </div>
            
            <div class="social-login">
                <button type="button" class="btn btn-social">
                    <span>📧</span>
                    Continue with Email
                </button>
                <button type="button" class="btn btn-social">
                    <span>🔗</span>
                    Continue with Google
                </button>
            </div>
        </div>
        
        <div class="auth-background">
            <div class="floating-book">📖</div>
            <div class="floating-book">📚</div>
            <div class="floating-book">📓</div>
            <div class="floating-book">📔</div>
            <div class="floating-book">📕</div>
            <div class="floating-book">📗</div>
        </div>
    </div>
    
    <script src="../js/auth.js"></script>
</body>
</html>
